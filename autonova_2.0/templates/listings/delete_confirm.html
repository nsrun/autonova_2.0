{% extends 'base.html' %}
{% block title %}Delete Listing — AutoNova{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="an-card p-5 text-center">
                <div class="an-delete-icon mb-4"><i class="bi bi-trash3-fill text-danger display-3"></i></div>
                <h3 class="fw-bold mb-2">Delete Listing?</h3>
                <p class="text-muted mb-4">Permanently delete <strong>"{{ listing.title }}"</strong>? This cannot be undone.</p>
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex gap-3 justify-content-center">
                        <button type="submit" class="btn btn-danger btn-lg px-4"><i class="bi bi-trash me-2"></i>Yes, Delete</button>
                        <a href="/accounts/dashboard/" class="btn btn-outline-secondary btn-lg px-4">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
